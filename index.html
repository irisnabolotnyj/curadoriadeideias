<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acervo de Ideias | Dra. Iris Nabolotnyj Martinez</title>

    <!-- Fonte única e elegante -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #330000;
            color: #FFFFFF;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 400;
            display: flex;
            min-height: 100vh;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 55px;
            background-color: #220000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px 0;
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 10;
        }

        .sidebar nav {
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            align-items: center;
        }

        .sidebar nav a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.65);
            font-family: 'Cormorant Garamond', serif;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.15em;
            transition: 0.25s ease;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            text-orientation: mixed;
        }

        .sidebar nav a:hover {
            color: #FFFFFF;
        }

        /* ===== CONTEÚDO PRINCIPAL ===== */
        .main-content {
            flex: 1;
            margin-left: 55px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 4vw;
            position: relative;
            min-height: 100vh;
        }

        /* ===== TOPO ===== */
        .topo-info {
            position: absolute;
            top: 2.5rem;
            left: 2.5rem;
            right: 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            width: calc(100% - 5rem);
        }

        .frase-esquerda {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 400;
            font-style: italic;
            font-size: 1.1rem;
            color: #FFFFFF;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .temas-topo {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 2.5px;
            color: #FFFFFF;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .temas-topo .ponto {
            font-weight: 700;
            font-size: 1.4rem;
            line-height: 0.8;
            margin: 0 0.15em;
            display: inline-block;
            vertical-align: middle;
            color: #FFFFFF;
        }

        /* ===== MARCA CENTRAL ===== */
        .marca-central {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            width: 100%;
            margin-top: -2rem;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(4.5rem, 13vw, 9rem);
            font-weight: 700;
            color: #FFFFFF;
            letter-spacing: -1px;
            line-height: 0.9;
            white-space: nowrap;
            display: flex;
            align-items: baseline;
            gap: 0.2em;
            margin-bottom: 0.2em;
        }

        /* "DE" agora em maiúsculas, negrito e mesmo tamanho */
        .de-normal {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            font-style: normal;
            text-transform: uppercase;
            letter-spacing: inherit;
            font-size: 1em;
            /* mesmo tamanho que o resto */
            position: static;
            /* remove deslocamento anterior */
        }

        .assinatura-dra {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 400;
            font-style: italic;
            font-size: 1.1rem;
            color: #FFFFFF;
            letter-spacing: 0.3px;
            text-align: center;
            margin-top: 0.8rem;
            white-space: nowrap;
        }

        .direitos {
            position: absolute;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.8rem;
            font-weight: 400;
            color: #FFFFFF;
            text-align: center;
            white-space: nowrap;
            letter-spacing: 0.5px;
            pointer-events: none;
        }

        /* ===== RESPONSIVO ===== */
        @media (max-width: 768px) {
            .sidebar {
                width: 50px;
                padding: 20px 0;
            }

            .main-content {
                margin-left: 50px;
                padding: 6vw;
            }

            h1 {
                font-size: clamp(3rem, 16vw, 6rem);
                white-space: normal;
                gap: 0.2em;
                flex-wrap: wrap;
                justify-content: center;
            }

            .de-normal {
                font-size: 1em;
                /* mantém o mesmo tamanho */
            }

            .frase-esquerda {
                font-size: 1rem;
                white-space: normal;
            }

            .assinatura-dra {
                font-size: 1rem;
                margin-top: 0.5rem;
            }

            .topo-info {
                top: 1rem;
                left: 1rem;
                right: 1rem;
                width: calc(100% - 2rem);
                flex-wrap: wrap;
                justify-content: center;
                gap: 0.5rem;
            }

            .temas-topo {
                font-size: 1rem;
                white-space: normal;
                letter-spacing: 2px;
            }

            .sidebar nav a {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <nav>
            <a href="quem-sou.html">Quem sou</a>
            <a href="servicos.html">Serviços</a>
            <a href="publicacoes.html">Publicações</a>
            <a href="contato.html">Contato</a>
        </nav>
    </aside>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="main-content">

        <!-- TOPO -->
        <div class="topo-info">
            <span class="frase-esquerda">O que não se nomeia, não se conhece.</span>
            <span class="temas-topo">
                Política <span class="ponto">·</span> Gênero <span class="ponto">·</span> Memória
            </span>
        </div>

        <!-- DIREITOS -->
        <div class="direitos">© Todos os direitos reservados</div>

        <!-- MARCA CENTRAL -->
        <div class="marca-central">
            <h1>
                ACERVO
                <span class="de-normal">DE</span>
                IDEIAS
            </h1>

            <p class="assinatura-dra">por Dra. Iris Nabolotnyj Martinez</p>
        </div>

    </main>

</body>
</html>
