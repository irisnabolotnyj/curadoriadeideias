<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris Nabolotnyj Martinez | Curadora de ideias</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #faf7f2;
            color: #2c2c2a;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            line-height: 1.7;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 10vw;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3rem, 8vw, 7rem);
            font-weight: 500;
            letter-spacing: -0.02em;
            line-height: 1;
            margin-bottom: 0.15em;
            color: #2c2c2a;
            white-space: nowrap;
        }

        .subtitulo {
            font-size: 1.8rem;
            font-weight: 400;
            margin-bottom: 1.8rem;
            font-family: 'Cormorant Garamond', serif;
            color: #2c2c2a;
        }

        .destaque {
            color: #4A6B3A;
        }

        .descricao {
            max-width: 520px;
            font-size: 1rem;
            font-weight: 300;
            color: #4a4844;
            margin-bottom: 3rem;
            line-height: 1.8;
            white-space: nowrap;
        }

        .link-jardim {
            text-decoration: none;
            color: #2c2c2a;
            border-bottom: 1.5px solid #4A6B3A;
            padding-bottom: 4px;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 0.02em;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .link-jardim:hover {
            color: #4A6B3A;
            border-bottom-color: #4A6B3A;
        }

        .folha {
            display: inline-block;
            width: 14px;
            height: 14px;
            background: #4A6B3A;
            border-radius: 0 50% 50% 50%;
            transform: rotate(45deg);
            transition: transform 0.3s ease;
        }

        .link-jardim:hover .folha {
            transform: rotate(45deg) scale(1.2);
        }

        .linha-terra {
            width: 60px;
            height: 1px;
            background: #d4cfc4;
            margin-top: 4rem;
        }

        footer {
            padding: 2rem 10vw;
            font-size: 0.85rem;
            color: #9a948c;
            border-top: 1px solid #eae6df;
            text-align: center;
            font-weight: 300;
        }
    </style>
</head>
<body>
    <main>
        <h1>Iris Nabolotnyj Martinez</h1>

        <p class="subtitulo">
            <span class="destaque">Curadora de ideias</span>
        </p>

        <p class="descricao">
            Escrevo, refletindo. Pesquiso, cultivando ideias sobre política, desigualdade, gênero e sociedade.
        </p>

        <a href="ideias.html" class="link-jardim">
            <span class="folha"></span> Entrar
        </a>

        <div class="linha-terra"></div>
    </main>

    <footer>
        © Iris Nabolotnyj Martinez
    </footer>
</body>
</html>
