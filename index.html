<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acervo | Dra. Iris Nabolotnyj Martinez</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;                /* Preto de autoridade */
            color: #f0f0f0;                     /* Texto claro para contraste */
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            line-height: 1.7;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 8vw;
            max-width: 700px;
            margin: 0 auto;
            width: 100%;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 0.2em;
            color: #ffffff;
        }

        .destaque {
            color: #BFFF00;                     /* Verde limão vibrante */
        }

        .subtitulo {
            font-size: 1.2rem;
            font-weight: 300;
            color: #a0a0a0;
            margin-bottom: 3.5rem;
        }

        /* Lista do acervo */
        .ideias-lista {
            list-style: none;
            width: 100%;
            max-width: 450px;
            margin-bottom: 3.5rem;
        }

        .ideias-lista li {
            margin-bottom: 2rem;
        }

        .ideias-lista a {
            text-decoration: none;
            color: #BFFF00;                     /* Verde limão */
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 600;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
            display: inline-block;
            padding-bottom: 3px;
        }

        .ideias-lista a:hover {
            color: #FF0000;                     /* Vermelho sangue vivo */
            border-bottom-color: #FF0000;
        }

        .data {
            display: block;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            color: #7a7a7a;
            margin-top: 0.2rem;
        }

        /* Link de volta */
        .voltar {
            text-decoration: none;
            color: #BFFF00;                     /* Verde limão */
            font-size: 1rem;
            font-weight: 400;
            border-bottom: 1.5px solid transparent;
            padding-bottom: 3px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .voltar:hover {
            color: #FF0000;                     /* Vermelho sangue */
            border-bottom-color: #FF0000;
        }

        footer {
            padding: 2rem 10vw;
            font-size: 0.85rem;
            color: #6a6a6a;
            border-top: 1px solid #1f1f1f;
            text-align: center;
            font-weight: 300;
        }
    </style>
</head>
<body>
    <main>
        <h1><span class="destaque">Acervo</span></h1>

        <p class="subtitulo">
            Textos com profundidade e posicionamento.
        </p>

        <ul class="ideias-lista">
            <li>
                <a href="#">A raiz da desigualdade</a>
                <span class="data">Breve ensaio — em breve</span>
            </li>
            <li>
                <a href="#">Gênero e poder: sementes de mudança</a>
                <span class="data">Reflexão — em breve</span>
            </li>
            <li>
                <a href="#">Política como cultivo coletivo</a>
                <span class="data">Artigo — em breve</span>
            </li>
        </ul>

        <a href="index.html" class="voltar">
            ← Voltar ao início
        </a>
    </main>

    <footer>
        © Dra. Iris Nabolotnyj Martinez
    </footer>
</body>
</html>
